<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Balões dos Micos</title>
  <style>
    :root{
      --azul-escuro:#071b3d;
      --azul:#1768d7;
      --azul-claro:#54b8ff;
      --laranja:#ff9f2e;
      --amarelo:#ffd85a;
      --branco:#fff;
      --texto:#0a2852;
      --sombra:0 18px 45px rgba(0,18,52,.30);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100vh;
      font-family:Arial, Helvetica, sans-serif;
      color:var(--branco);
      background:
        radial-gradient(circle at 12% 10%,rgba(84,184,255,.22),transparent 24%),
        radial-gradient(circle at 88% 12%,rgba(255,159,46,.20),transparent 25%),
        linear-gradient(135deg,#06152f 0%,#0a2d63 55%,#071c3d 100%);
      overflow-x:hidden;
    }
    .app{min-height:100vh;padding:18px;display:grid;grid-template-rows:auto 1fr auto;gap:14px}
    header{
      display:flex;align-items:center;justify-content:space-between;gap:16px;
      padding:14px 20px;border-radius:22px;
      background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.16);
      backdrop-filter:blur(12px);box-shadow:var(--sombra)
    }
    .brand{display:flex;align-items:center;gap:14px}
    .logo{
      width:64px;height:64px;border-radius:20px;display:grid;place-items:center;font-size:39px;
      background:linear-gradient(145deg,var(--laranja),var(--amarelo));
      box-shadow:0 10px 24px rgba(255,159,46,.32);border:3px solid rgba(255,255,255,.65)
    }
    h1{margin:0;font-size:clamp(28px,3vw,48px);line-height:1}
    .subtitle{margin:6px 0 0;color:#cfe3ff;font-size:clamp(14px,1.2vw,18px)}
    .actions{display:flex;gap:9px;flex-wrap:wrap;justify-content:flex-end}
    button{border:0;border-radius:14px;padding:12px 17px;font-size:16px;font-weight:900;cursor:pointer;transition:.2s}
    button:hover{transform:translateY(-2px)}
    .primary{background:linear-gradient(135deg,var(--laranja),var(--amarelo));color:#482800}
    .secondary{background:#e3f1ff;color:#0a3a75}

    main{
      min-height:0;padding:18px;border-radius:25px;
      background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);
      box-shadow:var(--sombra);backdrop-filter:blur(12px);position:relative;overflow:hidden
    }
    .topline{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:15px}
    .instruction{font-size:clamp(16px,1.5vw,22px);font-weight:800;color:#e8f4ff}
    .counter{background:rgba(0,0,0,.24);padding:9px 15px;border-radius:999px;font-weight:900;white-space:nowrap}
    .balloon-grid{
      height:calc(100vh - 205px);min-height:530px;
      display:grid;grid-template-columns:repeat(7,1fr);grid-template-rows:repeat(5,1fr);
      gap:10px;align-items:center;justify-items:center;padding:6px
    }
    .balloon{
      --c1:#46a8ff;--c2:#155fd0;
      width:min(8.8vw,112px);height:min(10.8vw,138px);min-width:68px;min-height:84px;
      padding:0;border:none;background:transparent;position:relative;filter:drop-shadow(0 11px 10px rgba(0,0,0,.28));
      animation:float 3.1s ease-in-out infinite;transform-origin:50% 95%
    }
    .balloon:nth-child(2n){animation-delay:-.7s}.balloon:nth-child(3n){animation-delay:-1.4s}.balloon:nth-child(5n){animation-delay:-2.1s}
    .balloon-body{
      position:absolute;inset:0 0 18% 0;border-radius:52% 52% 48% 48% / 58% 58% 42% 42%;
      background:
        radial-gradient(circle at 32% 24%,rgba(255,255,255,.78) 0 5%,rgba(255,255,255,.22) 6% 13%,transparent 14%),
        linear-gradient(145deg,var(--c1),var(--c2));
      border:3px solid rgba(255,255,255,.62);display:grid;place-items:center;
      box-shadow:inset -10px -14px 20px rgba(0,0,0,.16),inset 7px 8px 12px rgba(255,255,255,.15)
    }
    .balloon-body::after{
      content:"";position:absolute;bottom:-9px;left:50%;transform:translateX(-50%);
      width:0;height:0;border-left:9px solid transparent;border-right:9px solid transparent;border-top:14px solid var(--c2)
    }
    .balloon-string{position:absolute;top:80%;left:50%;height:24%;width:2px;background:rgba(255,255,255,.78);transform:translateX(-50%) rotate(4deg)}
    .balloon-number{font-size:clamp(21px,2.2vw,32px);font-weight:1000;color:white;text-shadow:0 3px 6px rgba(0,0,0,.35)}
    .balloon:hover{transform:scale(1.08) rotate(-2deg);z-index:3;animation-play-state:paused}
    .balloon.popped{pointer-events:none;animation:none;filter:none}
    .balloon.popped .balloon-body{animation:pop .36s ease forwards}
    .balloon.popped .balloon-string{opacity:0;transition:.15s}
    @keyframes float{0%,100%{translate:0 0;rotate:-1deg}50%{translate:0 -8px;rotate:1deg}}
    @keyframes pop{0%{transform:scale(1);opacity:1}45%{transform:scale(1.25);opacity:.85}100%{transform:scale(.05);opacity:0}}

    .confetti{position:fixed;width:10px;height:16px;z-index:50;pointer-events:none;animation:fall 1.25s ease-out forwards}
    @keyframes fall{from{transform:translate(0,0) rotate(0);opacity:1}to{transform:translate(var(--x),var(--y)) rotate(520deg);opacity:0}}

    .modal{position:fixed;inset:0;background:rgba(3,12,31,.78);display:none;align-items:center;justify-content:center;padding:22px;z-index:100;backdrop-filter:blur(7px)}
    .modal.show{display:flex}
    .card{
      width:min(760px,94vw);background:#fff;color:var(--texto);border-radius:30px;padding:34px;text-align:center;
      box-shadow:0 30px 80px rgba(0,0,0,.45);border:7px solid #ffbe42;position:relative;animation:cardIn .33s ease
    }
    @keyframes cardIn{from{transform:scale(.72) rotate(-2deg);opacity:0}to{transform:scale(1);opacity:1}}
    .mini{font-weight:900;color:#1768d7;letter-spacing:1.5px;text-transform:uppercase;font-size:18px}
    .emoji{font-size:73px;margin:9px 0 4px;display:block}
    .challenge{font-size:clamp(27px,3.2vw,46px);line-height:1.2;margin:8px 0 24px;font-weight:1000}
    .close{font-size:19px;padding:14px 28px}
    .done-message{display:none;position:absolute;inset:0;place-items:center;text-align:center;background:rgba(6,28,62,.96);z-index:30;padding:30px}
    .done-message.show{display:grid}
    .done-message h2{font-size:clamp(40px,6vw,80px);margin:0 0 12px}.done-message p{font-size:clamp(20px,2vw,30px);margin:0;color:#dcecff}
    footer{text-align:center;color:#bfd5f6;font-size:14px}

    @media(max-width:900px){
      .balloon-grid{grid-template-columns:repeat(5,1fr);grid-template-rows:repeat(7,1fr);height:auto;min-height:900px}
      .balloon{width:92px;height:114px}
      header{align-items:flex-start}.logo{width:54px;height:54px}.actions{max-width:240px}
    }
    @media(max-width:590px){
      .app{padding:10px}.brand .subtitle{display:none}.actions button{padding:10px 12px;font-size:14px}
      .balloon-grid{grid-template-columns:repeat(4,1fr);grid-template-rows:auto;min-height:auto;gap:5px}.balloon{width:76px;height:96px}
      main{padding:12px}.topline{align-items:flex-start}.instruction{max-width:60%}
    }
  </style>
</head>
<body>
<div class="app">
  <header>
    <div class="brand">
      <div class="logo">🎈</div>
      <div>
        <h1>Balões dos Micos</h1>
        <p class="subtitle">Escolha um balão, estoure e cumpra o desafio!</p>
      </div>
    </div>
    <div class="actions">
      <button class="secondary" id="shuffleBtn">🔀 Embaralhar</button>
      <button class="secondary" id="resetBtn">↻ Reiniciar</button>
      <button class="primary" id="fullscreenBtn">⛶ Tela cheia</button>
    </div>
  </header>

  <main>
    <div class="topline">
      <div class="instruction">Clique em um balão para descobrir o mico.</div>
      <div class="counter"><span id="remaining">35</span> balões restantes</div>
    </div>
    <section class="balloon-grid" id="balloonGrid" aria-label="Painel com 35 balões"></section>
    <div class="done-message" id="doneMessage">
      <div><h2>🎉 Todos os balões foram estourados!</h2><p>A turma concluiu os 35 micos.</p></div>
    </div>
  </main>
  <footer>Funciona offline • Desenvolvido para projeção em TV</footer>
</div>

<div class="modal" id="modal" role="dialog" aria-modal="true">
  <div class="card">
    <div class="mini" id="balloonLabel">Balão 1</div>
    <span class="emoji">🙈</span>
    <div class="challenge" id="challengeText"></div>
    <button class="primary close" id="closeBtn">Mico cumprido! ✓</button>
  </div>
</div>

<script>
  const challenges = [
    "Faça uma pose de super-herói por 10 segundos.",
    "Imite um robô caminhando e falando.",
    "Cante o refrão de uma música escolhida pela turma.",
    "Dance por 15 segundos sem música.",
    "Fale seu nome como se fosse apresentador de televisão.",
    "Imite um gato pedindo comida.",
    "Conte uma piada curta para a turma.",
    "Faça três expressões: alegria, susto e tristeza.",
    "Diga um trava-língua três vezes bem rápido.",
    "Caminhe como se estivesse na Lua.",
    "Faça uma declaração de amor para um objeto da sala.",
    "Imite um professor explicando uma matéria muito difícil.",
    "Fique em estátua por 15 segundos enquanto a turma tenta fazê-lo rir.",
    "Invente e faça um cumprimento secreto com um colega.",
    "Fale uma frase como se estivesse em câmera lenta.",
    "Faça uma propaganda de 20 segundos para uma borracha.",
    "Imite um animal escolhido pela turma até alguém adivinhar.",
    "Dance como se tivesse acabado de ganhar um campeonato.",
    "Fale o alfabeto com voz de personagem de desenho.",
    "Finja que está em uma passarela por 10 segundos.",
    "Faça o som de três animais diferentes.",
    "Crie um grito de torcida para a sala.",
    "Imite alguém tentando andar contra um vento muito forte.",
    "Diga cinco palavras que comecem com a mesma letra em 10 segundos.",
    "Faça uma entrevista rápida com um colega como se ele fosse famoso.",
    "Explique como usar um lápis como se fosse uma invenção revolucionária.",
    "Imite uma cena de novela bem dramática.",
    "Faça uma coreografia de três passos e ensine à turma.",
    "Conte uma história de 20 segundos usando as palavras escola, foguete e banana.",
    "Fale durante 15 segundos sem usar a letra A.",
    "Faça uma imitação de bebê tentando explicar a lição.",
    "Equilibre um caderno na cabeça e dê cinco passos.",
    "Invente um novo nome e um superpoder para você.",
    "Faça um discurso de agradecimento por ter ganhado um prêmio imaginário.",
    "Escolha um colega para fazer com você uma dança sincronizada de 10 segundos."
  ];

  const palettes = [
    ["#59b9ff","#1264d2"],["#ffbc4d","#f47a18"],["#8f7bff","#5540c9"],
    ["#43d9bb","#118d80"],["#ff8bb3","#cf3e79"],["#74d66d","#299345"],
    ["#ffe064","#e7a714"]
  ];

  const grid = document.getElementById("balloonGrid");
  const modal = document.getElementById("modal");
  const challengeText = document.getElementById("challengeText");
  const balloonLabel = document.getElementById("balloonLabel");
  const remainingEl = document.getElementById("remaining");
  const doneMessage = document.getElementById("doneMessage");
  let order = challenges.map((_,i)=>i);
  let used = new Set();

  function shuffle(array){
    for(let i=array.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[array[i],array[j]]=[array[j],array[i]]}
    return array;
  }

  function render(){
    grid.innerHTML="";
    order.forEach((challengeIndex,position)=>{
      const button=document.createElement("button");
      button.className="balloon"+(used.has(challengeIndex)?" popped":"");
      button.dataset.index=challengeIndex;
      button.setAttribute("aria-label",`Estourar balão ${position+1}`);
      const palette=palettes[position%palettes.length];
      button.style.setProperty("--c1",palette[0]);
      button.style.setProperty("--c2",palette[1]);
      button.innerHTML=`<span class="balloon-body"><span class="balloon-number">${position+1}</span></span><span class="balloon-string"></span>`;
      button.addEventListener("click",e=>popBalloon(button,challengeIndex,position,e));
      grid.appendChild(button);
    });
  }

  function popBalloon(button,index,position,event){
    if(used.has(index))return;
    used.add(index);
    button.classList.add("popped");
    createConfetti(event.clientX,event.clientY);
    playPop();
    setTimeout(()=>{
      balloonLabel.textContent=`Balão ${position+1}`;
      challengeText.textContent=challenges[index];
      modal.classList.add("show");
    },250);
    updateCounter();
  }

  function updateCounter(){
    const remaining=35-used.size;
    remainingEl.textContent=remaining;
    if(remaining===0)setTimeout(()=>doneMessage.classList.add("show"),500);
  }

  function createConfetti(x,y){
    const colors=["#54b8ff","#ff9f2e","#ffd85a","#fff","#8f7bff","#43d9bb"];
    for(let i=0;i<24;i++){
      const piece=document.createElement("span");
      piece.className="confetti";piece.style.left=x+"px";piece.style.top=y+"px";
      piece.style.background=colors[i%colors.length];
      piece.style.setProperty("--x",`${(Math.random()-.5)*360}px`);
      piece.style.setProperty("--y",`${80+Math.random()*300}px`);
      document.body.appendChild(piece);setTimeout(()=>piece.remove(),1300);
    }
  }

  function playPop(){
    try{
      const ctx=new (window.AudioContext||window.webkitAudioContext)();
      const osc=ctx.createOscillator();const gain=ctx.createGain();
      osc.type="triangle";osc.frequency.setValueAtTime(190,ctx.currentTime);osc.frequency.exponentialRampToValueAtTime(55,ctx.currentTime+.12);
      gain.gain.setValueAtTime(.16,ctx.currentTime);gain.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.13);
      osc.connect(gain);gain.connect(ctx.destination);osc.start();osc.stop(ctx.currentTime+.14);
    }catch(e){}
  }

  document.getElementById("closeBtn").onclick=()=>modal.classList.remove("show");
  modal.addEventListener("click",e=>{if(e.target===modal)modal.classList.remove("show")});
  document.addEventListener("keydown",e=>{if(e.key==="Escape")modal.classList.remove("show")});
  document.getElementById("shuffleBtn").onclick=()=>{order=shuffle([...order]);render()};
  document.getElementById("resetBtn").onclick=()=>{used.clear();order=shuffle(challenges.map((_,i)=>i));doneMessage.classList.remove("show");modal.classList.remove("show");updateCounter();render()};
  document.getElementById("fullscreenBtn").onclick=()=>{if(!document.fullscreenElement)document.documentElement.requestFullscreen?.();else document.exitFullscreen?.()};

  order=shuffle(order);render();updateCounter();
</script>
</body>
</html>
